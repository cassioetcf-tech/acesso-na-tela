<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>TESTE — Página do filme (Ingresso)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    :root { --laranja:#D4500F; --laranja-cl:#FDF0EA; --ink:#1A1A1A; --ink2:#444; --ink3:#777; --bg:#F7F6F3; --bdr:rgba(0,0,0,.11);
      --ad:#005C2E; --lse:#003D8F; --lib:#3D0070; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--ink); }
    .wrap { max-width:900px; margin:0 auto; padding:28px 20px 60px; }
    .note { background:#FFF3CD; border:1px solid #E8C97A; border-radius:10px; padding:12px 16px; font-size:14px; color:#7a5b00; margin-bottom:22px; }
    .hero { display:grid; grid-template-columns:220px 1fr; gap:24px; background:#fff; border:1px solid var(--bdr); border-radius:14px; padding:22px; }
    @media (max-width:600px){ .hero{ grid-template-columns:1fr; } }
    .poster { width:100%; aspect-ratio:2/3; border-radius:10px; overflow:hidden; background:#e9e7e2; }
    .poster img { width:100%; height:100%; object-fit:cover; display:block; }
    h1 { font-size:24px; margin:0 0 6px; line-height:1.2; }
    .meta { font-size:14px; color:var(--ink3); margin:0 0 14px; }
    .badges { display:flex; gap:6px; flex-wrap:wrap; margin:0 0 14px; }
    .b { font-size:11px; font-weight:800; color:#fff; border-radius:5px; padding:3px 9px; }
    .b-ad{background:var(--ad);} .b-lse{background:var(--lse);} .b-lib{background:var(--lib);}
    .app { display:inline-block; font-size:13px; color:var(--laranja); font-weight:700; background:var(--laranja-cl); border-radius:20px; padding:5px 14px; }
    .sinopse { background:#fff; border:1px solid var(--bdr); border-radius:14px; padding:22px; margin-top:18px; }
    .sinopse h2, .ficha-sec h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--laranja); margin:0 0 12px; }
    .sinopse p { font-size:15px; line-height:1.7; color:var(--ink2); margin:0; }
    .ficha-sec { background:#0f1115; color:#fff; border-radius:14px; padding:24px; margin-top:18px; }
    .ficha-sec h2 { color:#fff; }
    .ficha-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px 24px; }
    @media (max-width:600px){ .ficha-grid{ grid-template-columns:1fr 1fr; } }
    .ficha-grid .k { font-size:12px; color:var(--laranja); font-weight:700; }
    .ficha-grid .v { font-size:14px; color:#fff; margin-top:2px; }
    .loading { color:var(--ink3); }
    .trailer { margin-top:18px; }
    .trailer iframe { width:100%; aspect-ratio:16/9; border:0; border-radius:14px; background:#000; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="note">⚠️ <strong>Página de teste.</strong> Detalhe do filme montado <strong>só com dados do Ingresso.com</strong> (pôster, sinopse, ficha técnica, trailer). Troque o filme pela URL: <code>?urlKey=buenosaires</code>.</div>
    <div id="app"><p class="loading">Carregando…</p></div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api/supabase.js"></script>
  <script>
    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function poster(e){
      var imgs=(e&&e.images)||[];
      var p=imgs.find(function(i){return i.type==='PosterPortrait'&&i.url;})||imgs.find(function(i){return /poster/i.test(i.type)&&i.url;});
      return p?p.url:'';
    }
    function badges(a){ a=a||{}; var h='';
      if(a.ad!==false)h+='<span class="b b-ad">Audiodescrição</span>';
      if(a.lse!==false)h+='<span class="b b-lse">Legenda p/ surdos</span>';
      if(a.libras!==false)h+='<span class="b b-lib">Janela de Libras</span>';
      return h;
    }
    function ytId(e){
      var t=(e&&e.trailers)||[]; for(var i=0;i<t.length;i++){ var u=t[i].url||t[i].link||t[i].embedUrl||''; var m=String(u).match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{6,})/); if(m)return m[1]; } return '';
    }

    (async function(){
      var app=document.getElementById('app');
      var key=(new URLSearchParams(location.search).get('urlKey')||'todo-mundo-em-panico-2026').trim();
      var e={}, f={};
      try { var r=await fetch('/api/ingresso?urlKey='+encodeURIComponent(key)); e=await r.json(); } catch(err){}
      try { var rows=await supabaseGet('filmes','url_key=eq.'+encodeURIComponent(key)+'&select=titulo,app,a11y&limit=1'); f=(rows&&rows[0])||{}; } catch(err){}

      if(!e || !e.title){ app.innerHTML='<p class="loading">Filme não encontrado no Ingresso para urlKey: '+esc(key)+'</p>'; return; }

      var p=poster(e);
      var metaParts=[]; if(e.genres&&e.genres.length)metaParts.push(e.genres[0]); if(e.contentRating)metaParts.push(e.contentRating); if(e.duration)metaParts.push(e.duration+' min');
      var yt=ytId(e);

      var fichaItems=[
        ['Nome Original', e.originalTitle],
        ['Direção', e.director],
        ['Duração', e.duration?e.duration+' min':''],
        ['Gênero', (e.genres||[]).join(', ')],
        ['Distribuidor', e.distributor],
        ['País de Origem', e.countryOrigin],
      ].filter(function(x){return x[1];});

      app.innerHTML =
        '<div class="hero">' +
          '<div class="poster">' + (p?'<img src="'+p+'" alt="">':'') + '</div>' +
          '<div>' +
            '<h1>' + esc(e.title) + '</h1>' +
            '<p class="meta">' + esc(metaParts.join(' · ')) + '</p>' +
            '<div class="badges">' + badges(f.a11y) + '</div>' +
            (f.app?'<span class="app">● '+esc(f.app)+'</span>':'') +
          '</div>' +
        '</div>' +
        (yt?'<div class="trailer"><iframe src="https://www.youtube.com/embed/'+yt+'?rel=0" allowfullscreen loading="lazy"></iframe></div>':'') +
        (e.synopsis?'<div class="sinopse"><h2>Sinopse acessível</h2><p>'+esc(e.synopsis)+'</p></div>':'') +
        (fichaItems.length?'<div class="ficha-sec"><h2>Ficha técnica</h2><div class="ficha-grid">'+
          fichaItems.map(function(x){return '<div><div class="k">'+esc(x[0])+':</div><div class="v">'+esc(x[1])+'</div></div>';}).join('')+
        '</div></div>':'');
    })();
  </script>
</body>
</html>
