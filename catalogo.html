<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — Acesso na Tela</title>
  <meta name="description" content="Filmes com audiodescrição, legenda para surdos e Libras disponíveis no streaming.">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/assets/favicon.ico" sizes="any">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500&display=swap">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/a11y.css">
  <link rel="stylesheet" href="/css/pages/catalogo.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Ir para o conteúdo [1]</a>
  <a href="#header-mount" class="skip-link">Ir para o menu [2]</a>

  <div id="a11y-bar-mount"></div>
  <div aria-live="polite" aria-atomic="true" class="sr-only" id="live-region"></div>

  <div class="shell">
    <div id="header-mount"></div>

    <main id="main-content" tabindex="-1">

      <section class="cat-hero" aria-labelledby="cat-h1">
        <h1 id="cat-h1">Catálogo de filmes <em>acessíveis</em></h1>
        <p>Filmes com audiodescrição, legenda para surdos e Libras disponíveis no streaming. Assista quando e onde quiser.</p>
      </section>

      <div class="cat-toolbar" role="search" aria-label="Filtrar catálogo">
        <div class="toolbar-inner">
          <div class="search-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="search" id="busca-catalogo" placeholder="Buscar filme..." aria-label="Buscar no catálogo" autocomplete="off">
          </div>
          <span class="plat-label" id="plat-label">Plataforma:</span>
          <div class="plat-select-wrap">
            <select id="plat-select" aria-labelledby="plat-label" aria-label="Filtrar por plataforma de streaming">
              <option value="todas">Todas as plataformas</option>
            </select>
          </div>
          <div class="plat-chips" id="chips-plataformas" aria-hidden="true" style="display:none">
            <button class="chip-plat ativo" data-plataforma="todas" aria-pressed="true">Todas</button>
          </div>
          <span class="resultado-count" id="resultado-count" aria-live="polite" aria-atomic="true"></span>
        </div>
      </div>

      <div class="cat-main">
        <div class="filmes-grid" id="filmes-grid" aria-live="polite" aria-label="Lista de filmes do catálogo">
          <div class="sk-card" aria-hidden="true"><div class="sk-poster"></div><div class="sk-body"><div class="sk-line sk-title"></div><div class="sk-line sk-meta"></div></div></div>
          <div class="sk-card" aria-hidden="true"><div class="sk-poster"></div><div class="sk-body"><div class="sk-line sk-title"></div><div class="sk-line sk-meta"></div></div></div>
          <div class="sk-card" aria-hidden="true"><div class="sk-poster"></div><div class="sk-body"><div class="sk-line sk-title"></div><div class="sk-line sk-meta"></div></div></div>
          <div class="sk-card" aria-hidden="true"><div class="sk-poster"></div><div class="sk-body"><div class="sk-line sk-title"></div><div class="sk-line sk-meta"></div></div></div>
          <div class="sk-card" aria-hidden="true"><div class="sk-poster"></div><div class="sk-body"><div class="sk-line sk-title"></div><div class="sk-line sk-meta"></div></div></div>
          <div class="sk-card" aria-hidden="true"><div class="sk-poster"></div><div class="sk-body"><div class="sk-line sk-title"></div><div class="sk-line sk-meta"></div></div></div>
        </div>
      </div>

    </main>

    <div id="footer-mount"></div>
  </div>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>

  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/a11y.js"></script>
  <script src="/js/api/supabase.js"></script>
  <script src="/js/api/tmdb.js"></script>
  <script src="/js/components/header.js"></script>
  <script src="/js/components/footer.js"></script>
  <script src="/js/components/film-card.js"></script>
  <script src="/js/pages/catalogo.js"></script>
</body>
</html>
